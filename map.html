<!DOCTYPE html>
<html lang="ja">
<head>
<title>VRツアーマップ</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body, html { width: 100%; height: 100%; overflow: hidden; background: #222; }
.map-container { width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; background: #222; overflow: hidden; }
.map-stage { position: relative; display: block; max-width: 100vw; max-height: 100vh; line-height: 0; }
.map-image { display: block; max-width: 100vw; max-height: 100vh; width: auto; height: auto; }
.overlay-text { position: absolute; z-index: 5; pointer-events: none; }
.main-title { font-size: 53px; color: #ff0000; font-weight: bold; font-family: 'Yu Mincho','YuMincho','Hiragino Mincho ProN','MS PMincho',serif; text-shadow: 0 0 10px rgba(0,0,0,0.95), 0 0 20px rgba(0,0,0,0.76), 0 0 30px rgba(0,0,0,0.57), 0 0 40px rgba(0,0,0,0.38); margin-bottom: 10px; text-align: left; }
.desc-text { font-size: 26px; color: #ffff00; font-family: 'Hiragino Kaku Gothic Pro','Meiryo',sans-serif; text-shadow: 0 0 10px rgba(0,0,0,0.9), 0 0 20px rgba(0,0,0,0.7200000000000001), 0 0 30px rgba(0,0,0,0.54), 0 0 40px rgba(0,0,0,0.36000000000000004); white-space: pre-wrap; line-height: 1.6; text-align: left; }
.map-pin { position: absolute; transform: translate(-50%, -100%); cursor: pointer; z-index: 10; display: flex; flex-direction: column; align-items: center; transition: transform 0.2s; }
.map-pin:hover, .map-pin:active { transform: translate(-50%, -100%) scale(1.15); }
.pin-icon { width: 36px; height: 36px; border: 3px solid white; border-radius: 50% 50% 50% 0; transform: rotate(-45deg); box-shadow: 0 3px 8px rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; }
.pin-number { transform: rotate(45deg); font-size: 14px; font-weight: bold; color: white; line-height: 1; }
.pin-label { background: rgba(255,255,255,0.95); color: #333; font-size: 12px; font-weight: bold; padding: 3px 8px; border-radius: 4px; white-space: nowrap; box-shadow: 0 2px 6px rgba(0,0,0,0.4); margin-bottom: 4px; pointer-events: none; font-family: sans-serif; }
</style>
</head>
<body>
<div class="map-container">
  <div class="map-stage" id="mapStage">
  <img src="map.jpg" alt="地図" class="map-image">
  <div class="overlay-text" style="left: 2%; top: 3%;">
    <div class="main-title">佐野植物園</div>
    <div class="desc-text">マジパン立ち上げテスト用</div>
  </div>
  </div>
</div>
<script>
var MAP_BOUNDS = { topLeft: { lat: 33.190974, lng: 131.724798 }, bottomRight: { lat: 33.190432, lng: 131.725909 } };
var MAP_INSETS = { left: 0, top: 0, right: 0, bottom: 0 };
var MAP_PIN_OFFSET = { x: 3, y: -1 };
var MAP_TWO_POINT = null;
function mercatorY(lat) { var r = lat * Math.PI / 180; return Math.log(Math.tan(Math.PI / 4 + r / 2)); }
function gpsToPercent(lat, lng) {
  var x, y, bounds = MAP_BOUNDS, tp = MAP_TWO_POINT;
  if (tp && tp.p1 && tp.p2) {
    var p1 = tp.p1, p2 = tp.p2;
    x = Math.abs(p2.lng - p1.lng) > 1e-12 ? p1.x + (lng - p1.lng) / (p2.lng - p1.lng) * (p2.x - p1.x) : p1.x;
    var y1 = mercatorY(p1.lat), y2 = mercatorY(p2.lat), ym = mercatorY(lat);
    if (Math.abs(y2 - y1) > 1e-12) { var s1 = p1.y / 100, s2 = p2.y / 100, sm = (ym - y1) / (y2 - y1); y = (s1 + sm * (s2 - s1)) * 100; } else { y = p1.y; }
  } else {
    var lngSpan = bounds.bottomRight.lng - bounds.topLeft.lng;
    var yTop = mercatorY(bounds.topLeft.lat), yBot = mercatorY(bounds.bottomRight.lat);
    x = lngSpan ? (lng - bounds.topLeft.lng) / lngSpan * 100 : 0;
    y = (yTop - yBot) ? (yTop - mercatorY(lat)) / (yTop - yBot) * 100 : 0;
  }
  var il = MAP_INSETS.left || 0, it = MAP_INSETS.top || 0, ir = MAP_INSETS.right || 0, ib = MAP_INSETS.bottom || 0;
  x = il + x * (100 - il - ir) / 100;
  y = it + y * (100 - it - ib) / 100;
  x += (MAP_PIN_OFFSET.x || 0); y += (MAP_PIN_OFFSET.y || 0);
  return { x: x, y: y };
}
var PINS = [

  // Pin #1: 入り口 (aa - sceneId: 0-aa001)
  { lat: 33.19087, lng: 131.725263, name: '入り口', sceneId: '0-aa001', color: '#800040', greenArrows: [{ sceneId: '10-aa011', startAngle: -70, endAngle: -100, targetSceneId: '13-bb001' }, { sceneId: '10-aa011', startAngle: 50, endAngle: 80, targetSceneId: '16-cc001' }, { sceneId: '11-aa012', startAngle: -70, endAngle: -110, targetSceneId: '17dd001' }] },

  // Pin #2: ブーゲンビリア (bb - sceneId: 13-bb001)
  { lat: 33.190465, lng: 131.72533, name: 'ブーゲンビリア', sceneId: '13-bb001', color: '#ff80c0', greenArrows: [{ sceneId: '13-bb001', startAngle: 100, endAngle: 130, targetSceneId: '10-aa011', yawOffset: 90 }] },

  // Pin #3: 中央広場 (cc - sceneId: 16-cc001)
  { lat: 33.190525, lng: 131.725291, name: '中央広場', sceneId: '16-cc001', color: '#00e600', greenArrows: [{ sceneId: '16-cc001', startAngle: 60, endAngle: 100, targetSceneId: '10-aa011', yawOffset: -90 }] },

  // Pin #4: シャクヤク (dd - sceneId: 17-dd001)
  { lat: 33.190619, lng: 131.72507, name: 'シャクヤク', sceneId: '17-dd001', color: '#8080ff', greenArrows: [{ sceneId: '17-dd001', startAngle: 70, endAngle: 110, targetSceneId: '11-aa012', yawOffset: 90 }] }
];

function goToScene(pin) {
  var url = './viewer.html?id=' + pin.sceneId;
  if (pin.flip) url += '&flip=1';
  if (pin.greenArrows && pin.greenArrows.length > 0) {
    var encoded = encodeURIComponent(JSON.stringify(pin.greenArrows));
    url += '&greenArrows=' + encoded;
  }
  url += '&back=./map.html';
  window.location.href = url;
}

var container = document.getElementById('mapStage');
PINS.forEach(function(pin, i) {
  var pos = gpsToPercent(pin.lat, pin.lng);
  var el = document.createElement('div');
  el.className = 'map-pin';
  el.style.left = pos.x + '%';
  el.style.top = pos.y + '%';
  el.setAttribute('data-idx', i);
  el.innerHTML = '<div class="pin-label">' + pin.name + '</div><div class="pin-icon" style="background:' + pin.color + ';"><span class="pin-number">' + (i+1) + '</span></div>';
  el.addEventListener('click', function() { goToScene(PINS[parseInt(this.getAttribute('data-idx'))]); });
  container.appendChild(el);
});
</script>
</body>
</html>
