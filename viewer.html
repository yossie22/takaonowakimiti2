<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>VR Tour</title>
<meta name="viewport" content="target-densitydpi=device-dpi, width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, minimal-ui" />
<link rel="icon" href="vr-icon.ico" type="image/x-icon">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
#pano { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

/* 十字キー（測定用：白） */
#crosshair {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  width: 30px; height: 30px; pointer-events: none; z-index: 100; opacity: 0; transition: opacity 0.5s ease;
}
#crosshair.visible { opacity: 0.6; }
#crosshair::before, #crosshair::after { content: ''; position: absolute; background: white; }
#crosshair::before { top: 14px; left: 0; width: 30px; height: 2px; }
#crosshair::after { left: 14px; top: 0; width: 2px; height: 30px; }

#compassContainer {
  position: absolute; top: 20px; right: 20px; display: flex; align-items: center; z-index: 100;
  transition: opacity 0.5s ease; opacity: 0; pointer-events: none;
}
#compassContainer.visible { opacity: 1; pointer-events: auto; }

/* 方位計（数値：全シーン共通） */
#degreeCircle {
  width: 60px; height: 60px; background: rgba(255,255,255,0.8); border-radius: 50%; border: 3px solid #0066ff;
  display: flex; flex-direction: column; justify-content: center; align-items: center;
  font-family: sans-serif; font-weight: bold; font-size: 14px; color: #0066ff;
  z-index: 102;
}
#degreeCircle small { font-size: 10px; color: #666; }

/* コンパス（針：データがある時のみ） */
#compassCircle {
  width: 60px; height: 60px; background: white; border-radius: 50%; border: 3px solid #0066ff;
  margin-left: 10px; display: none; justify-content: center; align-items: center; box-shadow: 0 4px 8px rgba(0,0,0,0.3);
}
#compassCircle.active { display: flex; }

#volumeContainer {
  position: absolute; top: 20px; left: 20px; height: 60px; display: flex; align-items: center;
  background: rgba(54, 40, 34, 0.85); padding: 0 20px; border-radius: 30px;
  z-index: 100; transition: opacity 0.5s ease; opacity: 0; border: 1px solid rgba(255,255,255,0.2);
  pointer-events: none;
}
#volumeContainer.visible { opacity: 0.8; pointer-events: auto; }
#volumeLabel { color: #FF8C00; font-weight: bold; font-family: sans-serif; margin-right: 12px; font-size: 18px; }
#volumeSlider { cursor: pointer; width: 100px; height: 8px; accent-color: #00FF00; }
.auto-ctrl{position:absolute;left:20px;height:46px;display:flex;align-items:center;padding:0 14px;border-radius:23px;z-index:100;transition:opacity 0.5s ease;opacity:0;pointer-events:none;}
.auto-ctrl.visible{opacity:0.9;pointer-events:auto;}
#speedContainer{top:90px;background:rgba(10,30,55,0.88);border:1px solid rgba(80,160,255,0.4);}
#zoomContainer{top:144px;background:rgba(10,45,25,0.88);border:1px solid rgba(80,200,100,0.4);}
#fadeContainer{top:198px;background:rgba(55,20,40,0.88);border:1px solid rgba(255,100,160,0.4);}
.ctrl-label{font-weight:bold;font-family:sans-serif;font-size:14px;margin-right:8px;white-space:nowrap;}
#speedContainer .ctrl-label{color:#66ccff;}#zoomContainer .ctrl-label{color:#88ee88;}#fadeContainer .ctrl-label{color:#ffaacc;}
.ctrl-slider{cursor:pointer;width:80px;height:8px;}
#speedSlider{accent-color:#66ccff;}#zoomSlider{accent-color:#88ee88;}#fadeSlider{accent-color:#ffaacc;}
.ctrl-val{font-family:sans-serif;font-size:12px;margin-left:7px;min-width:38px;}
#speedVal{color:#aaddff;}#zoomVal{color:#aaffaa;}#fadeVal{color:#ffccdd;}

#mapButton { position: absolute; bottom: 30px; left: 20px; width: 70px; height: 70px; cursor: pointer; z-index: 100; opacity: 0; transition: opacity 0.5s ease; pointer-events: none; }
#mapButton.visible { opacity: 0.7; pointer-events: auto; }
#counter { position: absolute; bottom: 30px; left: 110px; width: 60px; height: 60px; background: white; border: 3px solid #ff0000; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 24px; font-weight: bold; color: #0066ff; z-index: 100; opacity: 0; transition: opacity 0.5s ease; pointer-events: none; user-select: none; }
#counter.visible { opacity: 0.7; pointer-events: auto; }

.arrow-nav { position: absolute; width: 60px; height: 60px; cursor: pointer; z-index: 100; opacity: 0; transition: opacity 0.5s ease; pointer-events: none; }
.arrow-nav.visible { opacity: 0.8; pointer-events: auto; }
#arrowUp { bottom: 160px; right: 120px; }
#arrowDown { bottom: 50px; right: 120px; }
#arrowLeft { bottom: 105px; right: 185px; }
#arrowRight { bottom: 105px; right: 55px; }
#arrowUpGreen { bottom: 189px; right: 133px; }

/* 53-cc001 フェードイン用オーバーレイ（白系） */
#fadeOverlay {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(255, 255, 255, 0.8); z-index: 1000; opacity: 0;
  pointer-events: none; transition: opacity 2s ease-out;
}

/* ===== infoHotspot テキストオーバーレイ ===== */
#sceneText {
  position: fixed;
  z-index: 200;
  display: inline-block;
  padding: 4px 10px;
  background: none;
  pointer-events: none;
  text-align: center;
  transform: translateX(-50%);
  white-space: nowrap;
  /* 多重シャドウで背景に溶け込む */
  text-shadow:
    0   0   2px  rgba(0,0,0,1),
    0   0   5px  rgba(0,0,0,1),
    0   0   10px rgba(0,0,0,0.85),
    1px  1px 1px rgba(0,0,0,1),
    -1px 1px 1px rgba(0,0,0,1),
    1px -1px 1px rgba(0,0,0,1),
    -1px -1px 1px rgba(0,0,0,1);
  opacity: 1;
  transition: opacity 1s ease;
}

/* 扉演出用：部分ぼかし（中心→外側へグラデーション） */
#blurOverlay {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  z-index: 1001;
  opacity: 0;
  pointer-events: none;

  /* ぼかし強度（JSで更新） */
  -webkit-backdrop-filter: blur(var(--blurPx, 14px));
  backdrop-filter: blur(var(--blurPx, 14px));

  /* クリック位置を中心に、内側ほど強く・外側ほど透明（=くっきり） */
  -webkit-mask-image: radial-gradient(circle at var(--bx, 50%) var(--by, 50%),
    rgba(0,0,0,1) 0px,
    rgba(0,0,0,1) var(--innerR, 120px),
    rgba(0,0,0,0) var(--outerR, 260px)
  );
  mask-image: radial-gradient(circle at var(--bx, 50%) var(--by, 50%),
    rgba(0,0,0,1) 0px,
    rgba(0,0,0,1) var(--innerR, 120px),
    rgba(0,0,0,0) var(--outerR, 260px)
  );
}

.portal-hotspot {
  position: relative;
  cursor: pointer;
  opacity: 0;
  pointer-events: none;
  overflow: visible;
}
.portal-hotspot img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.portal-hit-area {
  position: absolute;
  left: 39%;
  top: 39%;
  width: 22%;
  height: 22%;
  border-radius: 50%;
  z-index: 2;
  cursor: pointer;
  pointer-events: none;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}
.portal-hotspot.portal-tappable {
  pointer-events: none;
}
.portal-hotspot.portal-tappable .portal-hit-area {
  pointer-events: auto;
}
@media (pointer: coarse) {
  .portal-hit-area {
    left: 37%;
    top: 37%;
    width: 26%;
    height: 26%;
  }
}
.portal-inner {
  position: absolute;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  transform-origin: 50% 50%;
  transition-property: transform;
  transition-timing-function: ease-in-out;
  will-change: transform;
}
.portal-reveal-cover {
  position: absolute;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background-image: url("start.png");
  background-size: 100% 100%;
  background-position: center;
  background-repeat: no-repeat;
  transition-property: opacity;
  transition-timing-function: ease-in-out;
  pointer-events: none;
  transform: scale(1.1);
  transform-origin: 50% 50%;
}

</style>
<script src="data.js"></script>
</head>

<body>
<div id="pano"></div>
<div id="sceneText"></div>
<div id="fadeOverlay"></div>
<div id="blurOverlay"></div>
<div id="crosshair"></div>

<div id="compassContainer">
  <div id="degreeCircle"><span id="yawTxt">0°</span><small id="pitchTxt">0°</small></div>
  <div id="compassCircle">
    <svg id="compassNeedle" viewBox="0 0 100 100" width="45" height="45" style="transition: transform 0.1s linear;">
      <polygon points="50,90 65,50 35,50" fill="#999999" />
      <polygon points="50,10 65,50 35,50" fill="#E60000" />
      <text x="50" y="42" font-family="sans-serif" font-size="20" fill="white" font-weight="bold" text-anchor="middle">N</text>
      <circle cx="50" cy="50" r="5" fill="#333333" />
    </svg>
  </div>
</div>

<div id="volumeContainer">
  <span id="volumeLabel">VOL</span>
  <input type="range" id="volumeSlider" min="0" max="1" step="0.05" value="0.5">
</div>
<div id="speedContainer" class="auto-ctrl"><span class="ctrl-label">速度</span><input type="range" id="speedSlider" class="ctrl-slider" min="1" max="9" step="1" value="6"><span class="ctrl-val" id="speedVal">少し速</span></div>
<div id="zoomContainer" class="auto-ctrl"><span class="ctrl-label">ズーム幅</span><input type="range" id="zoomSlider" class="ctrl-slider" min="1" max="9" step="1" value="2"><span class="ctrl-val" id="zoomVal">極小</span></div>
<div id="fadeContainer" class="auto-ctrl"><span class="ctrl-label">フェード幅</span><input type="range" id="fadeSlider" class="ctrl-slider" min="1" max="9" step="1" value="8"><span class="ctrl-val" id="fadeVal">極大</span></div>

<img id="mapButton" src="Map戻り-removebg-preview.png" onclick="goToMap()">
<div id="counter">1</div>
<img id="arrowUp" class="arrow-nav" src="上-removebg-preview.png">
<img id="arrowDown" class="arrow-nav" src="下-removebg-preview.png">
<img id="arrowLeft" class="arrow-nav" src="左-removebg-preview.png">
<img id="arrowRight" class="arrow-nav" src="右-removebg-preview.png">
<img id="arrowUpGreen" class="arrow-nav" src="緑上-removebg-preview.png">

<script src="vendor/marzipano.js"></script>
<script>
// ポータル画像は data.js の imageHotspots（sourceScene / sceneStartId で出発地に紐付け）

// ========================================
// ★ 修正案A：URLパラメータ読み込みをIIFE外に移動
// スコープ隔離による greenArrowConfig 消失を解決
// ========================================
var urlParams = new URLSearchParams(window.location.search);
var initialYaw = urlParams.get('yaw');
// ★ 前後左右反転フラグ（?flip=1 で全矢印方向を逆にする）
var flipDir = urlParams.get('flip') === '1';
// ★タイルフォルダ名（実フォルダに合わせて 'tiles'）
window.TILES_BASE = "tiles1024";

// data.js を fetch で読み込む（cache: 'no-store' でキャッシュを完全無効化）
(function loadDataAndBoot() {
  fetch('data.js', { cache: 'no-store' })
    .then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.text();
    })
    .then(function(text) {
      // data.js を実行して window.APP_DATA を定義
      // eslint-disable-next-line no-new-func
      (new Function(text))();
      if (!window.APP_DATA) throw new Error('APP_DATA が未定義');
      console.log('✅ data.js をキャッシュなしで読み込みました (fetch)');
      startViewer();
    })
    .catch(function(err) {
      // フォールバック：file://環境など fetch が使えない場合は script タグで読み込む
      console.warn('⚠ fetch失敗、script タグで再試行:', err);
      var s = document.createElement('script');
      s.src = 'data.js?v=' + Date.now();
      s.onload = function() {
        console.log('✅ data.js を script タグで読み込みました');
        startViewer();
      };
      document.head.appendChild(s);
    });
})();

// 緑矢印設定をグローバルスコープで先に定義
window.greenArrowConfig = {
  arrows: []
};

// ★ infoHotspot テキスト管理
window.shownTextScenes = {};   // 表示済みシーンID記録
window.sceneTextTimer  = null; // フェードアウトタイマー
var sceneTextScale = 1.6;       // text_generator のプレビューに近づけるための表示倍率

// ★3種類の法則を実装するためのグローバル変数
window.returnScene = null;                    // 戻り先シーン
window.departureYaw = null;                   // 出発時の aa での yaw
window.bbInitialYaw = null;                   // 進入先の初期 yaw（bb/cc の正面）

// ★ BGM再生管理
var bgmAudios = {};              // { fileName: HTMLAudioElement }
var bgmVolume = parseFloat(localStorage.getItem('bgmVolume') || '0.5'); // 0..1
// ★地図側のON/OFF（デフォルト：true）
var bgmEnabled = (localStorage.getItem('bgmEnabled') !== 'false');  // 'false' 以外は true
// ★長押しで「地図OFFでも鳴らす」強制再生フラグ
var bgmForce = false;
var bgmFadeOutDuration = 1000;   // フェードアウト時間（ms）

// URLパラメータから緑矢印データを読み込み（IIFE外で実行）
var greenArrowsParam = urlParams.get('greenArrows');
console.log('🔍 greenArrowsParam from URL:', greenArrowsParam);

if (greenArrowsParam) {
  try {
    console.log('🔍 Attempting to parse:', greenArrowsParam);
    var decoded = decodeURIComponent(greenArrowsParam);
    console.log('🔍 After decodeURIComponent:', decoded);
    var arrowsArray = JSON.parse(decoded);
    console.log('🔍 After JSON.parse:', arrowsArray);
    if (Array.isArray(arrowsArray)) {
      window.greenArrowConfig.arrows = arrowsArray;
      console.log('✅ greenArrows loaded successfully:', window.greenArrowConfig.arrows);
    } else {
      console.warn('⚠️ arrowsArray is not an array');
    }
  } catch(e) {
    console.error('❌ Failed to parse greenArrows:', e.message, e);
  }
} else {
  console.warn('⚠️ greenArrowsParam is null or undefined from URL');
}

function startViewer() {
'use strict';
var Marzipano = window.Marzipano;
var data = window.APP_DATA;

function sceneIdParts(id) {
  var match = String(id || '').match(/-([a-zA-Z]+)(\d+)$/);
  return match ? { course: match[1].toLowerCase(), number: parseInt(match[2], 10) } : null;
}

function inferScenePosition(sd) {
  var pos = Number(sd.position);
  if (Number.isFinite(pos)) return pos;
  var parts = sceneIdParts(sd.id);
  return parts && Number.isFinite(parts.number) ? parts.number : 1;
}

function normalizeSceneDirection(sd) {
  var dir = String(sd.direction || '').toLowerCase();
  if (dir === 'main') return 'iki';
  if (dir === 'iki' || dir === 'left' || dir === 'right' || dir === 'portal') return dir;

  var parts = sceneIdParts(sd.id);
  if (!parts) return 'iki';
  if (parts.course === 'bb') return 'left';
  if (parts.course === 'cc') return 'right';
  if (parts.course === 'dd') return 'portal';
  return 'iki';
}

// Marzipano 標準出力の data.js には position/direction が無いことがあるため、
// 黄色矢印とカウンターが使う最低限の情報をシーンIDから補完する。
data.scenes.forEach(function(sd) {
  sd.position = inferScenePosition(sd);
  sd.direction = normalizeSceneDirection(sd);
});

// ★ タイルレベルを自動補正（Marzipano出力の data.js をそのまま使えるようにする）
// 1024tiles では size > 1024 のレベルは存在しないため除去し、
// tileSize も size に合わせて補正する（例: tileSize:512,size:1024 → tileSize:1024,size:1024）
// ※ faceSize はソース画像の実際の面サイズなので変更しない
data.scenes.forEach(function(scene) {
  scene.levels = scene.levels.filter(function(l) { return l.size <= 1024; });
  scene.levels.forEach(function(l) {
    if (!l.fallbackOnly) l.tileSize = l.size;
  });
});

var panoElement = document.querySelector('#pano');
var viewer = new Marzipano.Viewer(panoElement);

// ★画面タッチで自動再生停止（黄色矢印と同じ方式）
panoElement.addEventListener('mousedown', function() {
  if (typeof autoMoveActive !== 'undefined' && autoMoveActive) {
    stopAutoMove();
    console.log('⛔ タッチで自動再生停止');
  }
});

panoElement.addEventListener('touchstart', function(e) {
  if (e.target && e.target.closest && e.target.closest('.portal-hotspot, .portal-hit-area')) {
    return;
  }
  if (typeof autoMoveActive !== 'undefined' && autoMoveActive) {
    stopAutoMove();
    console.log('⛔ タッチで自動再生停止');
  }
}, { passive: true });


// UI要素の取得（ここで一括定義するように修正）
var counterEl = document.getElementById('counter');
var mapBtnEl = document.getElementById('mapButton');
var crosshairEl = document.getElementById('crosshair');
var compassContEl = document.getElementById('compassContainer');
var compassNeedleCircle = document.getElementById('compassCircle');
var volumeUI = document.getElementById('volumeContainer');

var audioEnabled = false;
// ★長押しの再生/停止トグル（地図OFFとは別軸）
var bgmPlaying = true;

document.addEventListener('click', function enableAudioOnClick() {
  audioEnabled = true;
  document.removeEventListener('click', enableAudioOnClick);
}, { once: true });

function toggleBGMPlayback() {
  // 長押しは「地図でOFFでも強制的に鳴らす」ことがある
  if (bgmPlaying) {
    bgmPlaying = false;
    bgmForce = false;
    stopAllBGM();
  } else {
    bgmPlaying = true;
    if (!bgmEnabled) bgmForce = true;
    if (currentSceneObj) playSceneBGM(currentSceneObj.data.id, { force: true });
  }
}

var scenesData = {};
var currentScene = null, currentView = null, currentSceneObj = null;
var uiTimeout, showExtras = false, showVolume = false, pressTimer;
var speedUI=document.getElementById('speedContainer');
var zoomUI=document.getElementById('zoomContainer');
var fadeUI=document.getElementById('fadeContainer');
var showAutoCtrl=false;

data.scenes.forEach(function(sd) {
  var tilesBase = window.TILES_BASE || 'tiles';
  var source = Marzipano.ImageUrlSource.fromString(tilesBase + "/" + sd.id + "/{z}/{f}/{y}/{x}.jpg");
  var geometry = new Marzipano.CubeGeometry(sd.levels);
  var limiter = Marzipano.RectilinearView.limit.traditional(sd.faceSize, 75*Math.PI/180, 120*Math.PI/180);
  var view = new Marzipano.RectilinearView(sd.initialViewParameters, limiter);
  var scene = viewer.createScene({ source: source, geometry: geometry, view: view });
  var dir = sd.direction;
  scenesData[sd.id] = { scene: scene, view: view, data: Object.assign({}, sd, { direction: dir }) };
});

function showUI() {
  var standardUI = [mapBtnEl, counterEl];
  var arrows = document.querySelectorAll('.arrow-nav');

  standardUI.forEach(function(el) { if(el) el.classList.add('visible'); });
  arrows.forEach(function(el) { el.classList.add('visible'); });

  if (showExtras) {
    if(crosshairEl) crosshairEl.classList.add('visible');
    if(compassContEl) compassContEl.classList.add('visible');
    
    var hasCompassData = (currentSceneObj && (currentSceneObj.data.heading !== undefined || currentSceneObj.data.compassHeading !== undefined));
    if(hasCompassData) {
      compassNeedleCircle.classList.add('active');
    } else {
      compassNeedleCircle.classList.remove('active');
    }
  } else {
    if(crosshairEl) crosshairEl.classList.remove('visible');
    if(compassContEl) compassContEl.classList.remove('visible');
  }

  if (showVolume) volumeUI.classList.add('visible'); else volumeUI.classList.remove('visible');
  if(showAutoCtrl){[speedUI,zoomUI,fadeUI].forEach(function(el){if(el)el.classList.add('visible');});}
  else{[speedUI,zoomUI,fadeUI].forEach(function(el){if(el)el.classList.remove('visible');});}

  clearTimeout(uiTimeout);
  uiTimeout = setTimeout(function() {
    standardUI.concat([compassContEl, crosshairEl, volumeUI]).forEach(function(el) { if(el) el.classList.remove('visible'); });
    arrows.forEach(function(el) { el.classList.remove('visible'); });
  }, 3000);
}

// イベントリスナーの修正
if (counterEl) {
  counterEl.addEventListener('dblclick', function() {
    showExtras = !showExtras;
    showUI();
  });
  var tc=0,tt=null;
  counterEl.addEventListener('click',function(){
    tc++;if(tt)clearTimeout(tt);
    tt=setTimeout(function(){tc=0;},600);
    if(tc>=3){tc=0;clearTimeout(tt);showAutoCtrl=!showAutoCtrl;showUI();}
  });
  counterEl.addEventListener('mousedown', function() {
    pressTimer = setTimeout(function() {
      audioEnabled = true;
      toggleBGMPlayback();
      showVolume = !showVolume;
      showUI();
    }, 600);
  });
  counterEl.addEventListener('mouseup', function() { clearTimeout(pressTimer); });
  counterEl.addEventListener('touchstart', function() {
    pressTimer = setTimeout(function() {
      audioEnabled = true;
      toggleBGMPlayback();
      showVolume = !showVolume;
      showUI();
    }, 600);
  });
  counterEl.addEventListener('touchend', function() { clearTimeout(pressTimer); });
}

document.addEventListener('mousemove', showUI);
document.addEventListener('touchstart', showUI);

function angleDiffDeg(a, b) {
  var diff = a - b;
  while (diff > 180) diff -= 360;
  while (diff < -180) diff += 360;
  return diff;
}

function legacyPortalCenterRange(ih) {
  var ymin = typeof ih.yawMin === 'number' && !isNaN(ih.yawMin) ? ih.yawMin : 0;
  var ymax = typeof ih.yawMax === 'number' && !isNaN(ih.yawMax) ? ih.yawMax : ymin;
  var center = normalizeAngle(degToRad((ymin + angleDiffDeg(ymax, ymin) / 2))) * 180 / Math.PI;
  var range = Math.abs(angleDiffDeg(ymax, ymin)) / 2;
  return { center: center, range: range };
}

function portalCenterDeg(ih) {
  if (typeof ih.yawCenter === 'number' && !isNaN(ih.yawCenter)) return ih.yawCenter;
  return legacyPortalCenterRange(ih).center;
}

function portalRangeDeg(ih) {
  if (typeof ih.yawRange === 'number' && !isNaN(ih.yawRange)) return Math.max(0, ih.yawRange);
  return legacyPortalCenterRange(ih).range;
}

function portalPlacementYawRad(ih) {
  return degToRad(portalCenterDeg(ih));
}

function isRevealPortal(ih) {
  var preset = portalEffectPreset(ih);
  return preset.reveal;
}

function isGrowPortal(ih) {
  var preset = portalEffectPreset(ih);
  return preset.grow;
}

function portalEffectPreset(ih) {
  var effect = ih && ih.effect ? ih.effect : 'normal';
  var presets = {
    normal:     { reveal: false, grow: false, coverOpacity: 0.5, startScale: 0.88, endScale: 1.25, holdMin: 2500, coverFade: 1200, appearMax: 1800, appearMin: 900 },
    reveal:     { reveal: true,  grow: false, coverOpacity: 0.34,startScale: 0.88, endScale: 1.25, holdMin: 120, holdMax: 260, coverFade: 520, appearMax: 1300, appearMin: 450 },
    revealSoft: { reveal: true,  grow: false, coverOpacity: 0.22,startScale: 0.88, endScale: 1.25, holdMin: 80,  holdMax: 180, coverFade: 420, appearMax: 1000, appearMin: 350 },
    revealLong: { reveal: true,  grow: false, coverOpacity: 0.30,startScale: 0.88, endScale: 1.25, holdMin: 220, holdMax: 420, coverFade: 700, appearMax: 1500, appearMin: 500 },
    revealSlow: { reveal: true,  grow: false, coverOpacity: 0.26,startScale: 0.88, endScale: 1.25, holdMin: 300, holdMax: 600, coverFade: 850, appearMax: 1700, appearMin: 600 },
    grow:       { reveal: false, grow: true,  coverOpacity: 0.5, startScale: 0.88, endScale: 1.25, holdMin: 2500, coverFade: 1200, appearMax: 1800, appearMin: 900 },
    growHalf:   { reveal: false, grow: true,  coverOpacity: 0.5, startScale: 0.94, endScale: 1.12, holdMin: 2500, coverFade: 1200, appearMax: 1800, appearMin: 900 },
    growTiny:   { reveal: false, grow: true,  coverOpacity: 0.5, startScale: 0.97, endScale: 1.06, holdMin: 2500, coverFade: 1200, appearMax: 1800, appearMin: 900 },
    revealGrow: { reveal: true,  grow: true,  coverOpacity: 0.34,startScale: 0.88, endScale: 1.25, holdMin: 120, holdMax: 260, coverFade: 520, appearMax: 1300, appearMin: 450 },
    revealGrowSoft: { reveal: true, grow: true, coverOpacity: 0.22,startScale: 0.94, endScale: 1.12, holdMin: 80, holdMax: 180, coverFade: 420, appearMax: 1000, appearMin: 350 },
    revealGrowTiny: { reveal: true, grow: true, coverOpacity: 0.22,startScale: 0.97, endScale: 1.06, holdMin: 80, holdMax: 180, coverFade: 420, appearMax: 1000, appearMin: 350 },
    revealGrowSlow: { reveal: true, grow: true, coverOpacity: 0.26,startScale: 0.94, endScale: 1.12, holdMin: 300, holdMax: 600, coverFade: 850, appearMax: 1700, appearMin: 600 }
  };
  return presets[effect] || presets.normal;
}

function portalFadeMs(ih) {
  return Math.max(0, (parseFloat(ih.fadeTime) || 0) * 1000);
}

function portalDispMs(ih) {
  var value = parseFloat(ih.dispTime);
  if (!isFinite(value)) return 0;
  return Math.max(0, value <= 60 ? value * 1000 : value);
}

function portalStartHoldMs(ih, preset) {
  var value = parseFloat(ih.startHoldTime);
  var hold = isFinite(value) ? (value <= 60 ? value * 1000 : value) : 0;
  hold = Math.max(preset.holdMin, hold);
  return typeof preset.holdMax === 'number' ? Math.min(hold, preset.holdMax) : hold;
}

function scaledSceneTextFontSize(fontSize) {
  var px = parseFloat(fontSize);
  if (!isFinite(px)) return fontSize || '20px';
  return Math.round(px * sceneTextScale) + 'px';
}

function preparePortalMotion(inner, cover, ih, fadeMs) {
  var preset = portalEffectPreset(ih);
  inner.style.transitionDuration = Math.max(0, fadeMs) + 'ms';
  if (preset.grow) {
    inner.style.transform = 'scale(' + preset.startScale + ')';
  }
  if (cover) {
    cover.style.transition = 'none';
    cover.style.opacity = String(preset.coverOpacity);
    cover.getBoundingClientRect();
    cover.style.transitionProperty = 'opacity';
    cover.style.transitionTimingFunction = 'ease-in-out';
    cover.style.transitionDuration = Math.max(0, preset.coverFade) + 'ms';
  }
}

function showPortalMotion(inner, cover, ih, zoomMs) {
  var preset = portalEffectPreset(ih);
  if (inner && preset.grow) {
    inner.style.transitionDuration = Math.max(0, zoomMs) + 'ms';
    inner.style.transform = 'scale(' + preset.endScale + ')';
  }
  if (cover) {
    var holdMs = portalStartHoldMs(ih, preset);
    setTimeout(function() {
      cover.style.transitionDuration = Math.max(0, preset.coverFade) + 'ms';
      cover.style.opacity = '0';
    }, holdMs);
  }
}

function hidePortalMotion(inner, cover, ih) {
  var preset = portalEffectPreset(ih);
  if (inner && preset.grow) inner.style.transform = 'scale(' + preset.startScale + ')';
  if (cover) cover.style.opacity = String(preset.coverOpacity);
}

function setPortalTappable(hs, enabled) {
  if (!hs || !hs.img) return;
  hs.portalActive = !!enabled;
  if (enabled) hs.img.classList.add('portal-tappable');
  else hs.img.classList.remove('portal-tappable');
  hs.img.style.pointerEvents = 'none';
  if (hs.hitArea) hs.hitArea.style.pointerEvents = enabled ? 'auto' : 'none';
}

function bindPortalTap(el, onTap) {
  var lastTouchEnd = 0;
  var touchMoved = false;
  el.addEventListener('touchstart', function(e) {
    touchMoved = false;
    e.stopPropagation();
  }, { passive: true });
  el.addEventListener('touchmove', function() {
    touchMoved = true;
  }, { passive: true });
  el.addEventListener('touchend', function(e) {
    if (touchMoved) return;
    lastTouchEnd = Date.now();
    e.preventDefault();
    e.stopPropagation();
    onTap(e);
  }, { passive: false });
  el.addEventListener('click', function(e) {
    if (Date.now() - lastTouchEnd < 600) return;
    e.preventDefault();
    e.stopPropagation();
    onTap(e);
  });
}

function onPortalHotspotTap(hs) {
  if (!hs || !hs.portalActive || !hs.ih) return;
  var ih = hs.ih;
  console.log('🎎 hotspot タップ → ' + ih.targetScene + ' に移動');
  setPortalTappable(hs, false);
  switchScene(ih.targetScene, ih.targetYaw, ih.targetPitch, currentView.parameters().fov, true);
}

// 出発地シーンIDに属する imageHotspots を全シーンから収集（誤って別シーン配下にあっても表示）
function collectImageHotspotsForScene(sceneId) {
  var list = [];
  data.scenes.forEach(function(sd) {
    if (!sd.imageHotspots) return;
    sd.imageHotspots.forEach(function(ih) {
      var logical = ih.sourceScene || ih.sceneStartId || sd.id;
      if (logical === sceneId) list.push(ih);
    });
  });
  return list;
}

function switchScene(sceneId, yaw, pitch, fov, fromPortalHotspot) {
  var obj = scenesData[sceneId];
  if (!obj) return;
  
  console.log('🔵 switchScene: sceneId=' + sceneId + ', yaw=' + (yaw !== undefined ? radToDeg(yaw).toFixed(2) + '°' : 'undefined') + ', pitch=' + (pitch !== undefined ? radToDeg(pitch).toFixed(2) + '°' : 'undefined'));
  
  // ★hotspot フラグをリセット（新しいシーンで再度表示可能にする）
  if (window.hotspotImages) {
    window.hotspotImages = [];
  }
  // ★全ての hotspotShown フラグをリセット
  for (var key in window) {
    if (key.startsWith('hotspotShown_')) {
      window[key] = false;
    }
  }
  
  currentSceneObj = obj; currentScene = obj.scene; currentView = obj.view;
  
  // ★修正：yaw/pitch が指定されていない場合、initialViewParameters から取得
  var targetYaw = yaw;
  var targetPitch = pitch;
  
  if (initialYaw !== null) {
    targetYaw = degToRad(parseFloat(initialYaw));
    initialYaw = null;
  } else if (targetYaw === undefined) {
    // yaw が指定されていない場合は、initialViewParameters から使用
    targetYaw = obj.data.initialViewParameters?.yaw;
  }
  
  if (targetPitch === undefined) {
    // pitch が指定されていない場合は、initialViewParameters から使用
    targetPitch = obj.data.initialViewParameters?.pitch;
  }
  
  var targetFov = fov !== undefined ? fov : currentView.parameters().fov;

  var crossfadeDur=(typeof autoMoveActive!=='undefined'&&autoMoveActive)?Math.min(2000,Math.round(autoMoveInterval_ms*autoFadePct)):700;
  if (fromPortalHotspot) {
    crossfadeDur = Math.max(crossfadeDur, 1800);
  }
  currentScene.switchTo({ transitionDuration: crossfadeDur });

  // ★修正：switchTo の後に setParameters（穴森神社方式）
  if (targetYaw !== undefined && targetPitch !== undefined) {
    console.log('   → 実際に設定: yaw=' + radToDeg(normalizeAngle(targetYaw)).toFixed(2) + '°, pitch=' + radToDeg(targetPitch).toFixed(2) + '°');
    currentView.setParameters({ yaw: targetYaw, pitch: targetPitch, fov: targetFov });
  }
  
  // ===== infoHotspot テキスト表示（1シーン1回限り・7秒後フェードアウト） =====
  var textEl = document.getElementById('sceneText');
  // 【診断ログ】data.jsのinfoHotspotsを毎回確認
  var _ihs = obj.data.infoHotspots;
  console.log('📝 [infoHotspot診断] sceneId=' + sceneId
    + ' | 件数=' + (_ihs ? _ihs.length : 0)
    + ' | text=' + (_ihs && _ihs[0] ? (_ihs[0].text || _ihs[0].title) : 'なし')
    + ' | 既表示=' + !!window.shownTextScenes[sceneId]);
  if (obj.data.infoHotspots && obj.data.infoHotspots.length > 0 && (obj.data.infoHotspots[0].text || obj.data.infoHotspots[0].title)) {
    if (!window.shownTextScenes[sceneId]) {
      // このシーンはまだ未表示 → 表示する
      window.shownTextScenes[sceneId] = true;
      var hs = obj.data.infoHotspots[0];
      var hsStyle = hs.style || {};
      textEl.textContent = hs.text || hs.title;
      textEl.style.fontSize = scaledSceneTextFontSize(hsStyle.fontSize || '20px');
      textEl.style.fontFamily = hsStyle.fontFamily || 'sans-serif';
      textEl.style.color = hsStyle.color || '#ffffff';
      // pitch → 画面の縦位置（bottom %）
      var hsPitch = typeof hs.pitch === 'number' ? hs.pitch : 0.9;
      var bottomPct = Math.round(((1.5 - hsPitch) / 3.0) * 100);
      bottomPct = Math.max(2, Math.min(92, bottomPct));
      textEl.style.bottom = bottomPct + '%';
      // yaw → 画面の横位置（left %）
      var hsYaw = typeof hs.yaw === 'number' ? hs.yaw : 0;
      var leftPct = Math.round(((hsYaw + Math.PI) / (2 * Math.PI)) * 100);
      leftPct = Math.max(10, Math.min(90, leftPct));
      textEl.style.left = leftPct + '%';
      textEl.style.transition = 'none';
      textEl.style.opacity = '0';
      textEl.style.display = 'inline-block';
      textEl.getBoundingClientRect(); // 強制リフロー：opacity:0 を確定させる
      textEl.style.transition = 'opacity 1s ease';
      textEl.style.opacity = '1';
      // 既存タイマーをリセット
      if (window.sceneTextTimer) { clearTimeout(window.sceneTextTimer); }
      // 7秒後にフェードアウト開始（6.75秒かけて消える）
      window.sceneTextTimer = setTimeout(function() {
        textEl.style.transition = 'opacity 6.75s ease';
        textEl.style.opacity = '0';
        setTimeout(function() { textEl.style.display = 'none'; }, 6750);
      }, 7000);
    } else {
      // 再訪問 → 表示しない
      if (window.sceneTextTimer) { clearTimeout(window.sceneTextTimer); }
      textEl.style.display = 'none';
    }
  } else {
    if (window.sceneTextTimer) { clearTimeout(window.sceneTextTimer); }
    textEl.style.display = 'none';
  }
  
  if (counterEl) counterEl.textContent = obj.data.position;
  // ★ BGM処理：シーン切り替え時に再生（地図ON/OFF＋長押し状態に従う）
  playSceneBGM(sceneId);
  
  showUI();
  
  // ★imageHotspots（出発地＝sceneId に紐づくものを全シーンから収集）
  var portalList = collectImageHotspotsForScene(sceneId);
  console.log('🔍 [switchScene] sceneId=' + sceneId + ' ポータル件数=' + portalList.length);
  if (portalList.length > 0) {
    portalList.forEach(function(ih) {
      var wrapper = document.createElement('div');
      var inner = document.createElement('div');
      var img = document.createElement('img');
      var hitArea = document.createElement('div');
      var cover = null;
      var fadeMs = portalFadeMs(ih);
      var preset = portalEffectPreset(ih);
      img.src = ih.src;
      img.alt = '';
      img.style.opacity = preset.reveal ? '0' : '1';
      img.style.transition = 'opacity ' + fadeMs + 'ms ease-in-out';
      wrapper.className = 'image-hotspot portal-hotspot';
      wrapper.style.cssText = [
        'width:' + (ih.width || 400) + 'px',
        'height:' + (ih.height || 300) + 'px',
        'opacity:0',
        'transition:opacity ' + fadeMs + 'ms ease-in-out',
        'cursor:pointer',
        'pointer-events:none'
      ].join(';');
      inner.className = 'portal-inner';
      inner.appendChild(img);
      if (isRevealPortal(ih)) {
        cover = document.createElement('div');
        cover.className = 'portal-reveal-cover';
        inner.appendChild(cover);
      }
      hitArea.className = 'portal-hit-area';
      preparePortalMotion(inner, cover, ih, fadeMs);
      wrapper.appendChild(inner);
      wrapper.appendChild(hitArea);
      
      var hsRef = {
        img: wrapper,
        portalImg: img,
        inner: inner,
        cover: cover,
        hitArea: hitArea,
        ih: ih,
        sceneId: sceneId,
        flagKey: 'hotspotShown_' + sceneId + '_' + ih.targetScene,
        portalActive: false
      };
      bindPortalTap(hitArea, function() { onPortalHotspotTap(hsRef); });
      
      var placeYaw = portalPlacementYawRad(ih);
      var placePitch = 0;

      // ★hotspot を VR 空間に配置（中心角度へ。球面 yaw/pitch の個別設定は使わない）
      currentScene.hotspotContainer().createHotspot(wrapper,
        { yaw: placeYaw, pitch: placePitch },
        { perspective: { radius: ih.radius || 800 } }
      );
      
      // ★updateUI で opacity 制御用のグローバル参照を保持
      if (!window.hotspotImages) window.hotspotImages = [];
      window.hotspotImages.push(hsRef);
    });
  }

}

function updateUI() {
  if (!currentView) return;
  var yawDeg = radToDeg(normalizeAngle(currentView.parameters().yaw));
  var pitch = radToDeg(currentView.parameters().pitch);

  document.getElementById('yawTxt').textContent = Math.round(yawDeg) + '°';
  document.getElementById('pitchTxt').textContent = Math.round(pitch) + '°';
  document.getElementById('compassNeedle').style.transform = 'rotate(' + (-yawDeg) + 'deg)';

  // ★ホットスポットエディタ連携：現在の向きをlocalStorageに書き込む
  try {
    localStorage.setItem('hs_sceneId', currentSceneObj ? currentSceneObj.data.id : '');
    localStorage.setItem('hs_yaw',   currentView.parameters().yaw);
    localStorage.setItem('hs_pitch', currentView.parameters().pitch);
  } catch(e) {}

  var yawAbs = Math.abs(yawDeg);
  var isVert = yawAbs <= 45 || yawAbs > 135;
  document.getElementById('arrowUp').style.visibility = isVert ? 'visible' : 'hidden';
  document.getElementById('arrowDown').style.visibility = isVert ? 'visible' : 'hidden';
  document.getElementById('arrowLeft').style.visibility = isVert ? 'hidden' : 'visible';
  document.getElementById('arrowRight').style.visibility = isVert ? 'hidden' : 'visible';

  if (window.hotspotImages && window.hotspotImages.length > 0) {
    window.hotspotImages.forEach(function(hs) {
      if (currentSceneObj && currentSceneObj.data.id === hs.sceneId && !window[hs.flagKey]) {
        var center = portalCenterDeg(hs.ih);
        var range = portalRangeDeg(hs.ih);
        var inRange = Math.abs(angleDiffDeg(yawDeg, center)) <= range;
        
        if (inRange) {
          var fadeMs = portalFadeMs(hs.ih);
          var dispMs = portalDispMs(hs.ih);
          var totalTime = fadeMs + dispMs;
          var preset = portalEffectPreset(hs.ih);
          var appearMs = fadeMs;
          var imageDelayMs = preset.reveal ? Math.min(120, Math.round(portalStartHoldMs(hs.ih, preset) * 0.5), Math.max(0, totalTime - appearMs)) : 0;
          window[hs.flagKey] = true;
          showPortalMotion(hs.inner, hs.cover, hs.ih, totalTime);
          hs.img.style.transition = 'opacity ' + appearMs + 'ms ease-in-out';
          hs.img.style.opacity = '1';
          setPortalTappable(hs, true);
          if (hs.portalImg) {
            hs.portalImg.style.opacity = preset.reveal ? '0' : '1';
            hs.portalImg.style.transition = 'opacity ' + appearMs + 'ms ease-in-out';
            setTimeout(function() {
              if (hs.portalImg) hs.portalImg.style.opacity = '1';
            }, imageDelayMs);
          }
          console.log('🎎 hotspot フェードイン開始: ' + hs.ih.src + ' (fadeTime=' + hs.ih.fadeTime + 's, dispTime=' + dispMs + 'ms → totalTime=' + totalTime + 'ms ≈ ' + (totalTime/1000).toFixed(1) + '秒)');
          
          // 自動フェードアウト
          setTimeout(function() {
            hidePortalMotion(hs.inner, hs.cover, hs.ih);
            if (hs.portalImg) hs.portalImg.style.opacity = preset.reveal ? '0' : '1';
            hs.img.style.opacity = '0';
            setPortalTappable(hs, false);
            console.log('🎎 hotspot フェードアウト開始: ' + hs.ih.src);
            
            // ★リセット表示が有効な場合、フラグをリセット（再度フェード可能にする）
            if (hs.ih.resetDisplay) {
              window[hs.flagKey] = false;
              console.log('🔄 hotspot リセット表示有効: 次に表示範囲に入ったら再表示します');
            }
          }, totalTime);
        }
      }
    });
  }

  // 緑矢印の表示制御（複数脇道対応）
  document.getElementById('arrowUpGreen').style.visibility = (function() {
    if (!currentSceneObj) {
      console.log('🔴 currentSceneObj is null');
      return 'hidden';
    }
    if (!window.greenArrowConfig || window.greenArrowConfig.arrows.length === 0) {
      console.log('🔴 window.greenArrowConfig.arrows is empty');
      return 'hidden';
    }
    
    var yawDeg = radToDeg(normalizeAngle(currentView.parameters().yaw));
    console.log('🔍 updateUI check - currentScene:', currentSceneObj.data.id, 'yawDeg:', Math.round(yawDeg), 'arrows count:', window.greenArrowConfig.arrows.length);
    
    // すべての脇道をチェック
    for (var i = 0; i < window.greenArrowConfig.arrows.length; i++) {
      var arrow = window.greenArrowConfig.arrows[i];
      console.log('🔍 arrow ' + i + ':', 'sceneId=' + arrow.sceneId, 'range=' + arrow.startAngle + '～' + arrow.endAngle);
      
      // シーンID一致 & 角度範囲内か確認
      if (currentSceneObj.data.id === arrow.sceneId) {
        console.log('🔍 Scene match! Checking angle...');
        var isInRange = false;
        if (arrow.startAngle <= arrow.endAngle) {
          isInRange = yawDeg >= arrow.startAngle && yawDeg <= arrow.endAngle;
        } else {
          isInRange = yawDeg >= arrow.endAngle && yawDeg <= arrow.startAngle;
        }
        
        if (isInRange) {
          console.log('🟢 GREEN ARROW VISIBLE!', {sceneId: arrow.sceneId, yaw: Math.round(yawDeg), range: arrow.startAngle + '～' + arrow.endAngle});
          return 'visible';
        } else {
          console.log('🟡 Angle mismatch:', yawDeg, 'not in range', arrow.startAngle + '～' + arrow.endAngle);
        }
      } else {
        console.log('🟡 Scene mismatch:', currentSceneObj.data.id, '!==', arrow.sceneId);
      }
    }
    return 'hidden';
  })();
}

function executeMoveByDelta(delta) {
  if (!currentView || !currentSceneObj) return;

  var nextPos = currentSceneObj.data.position + delta;

  for (var id in scenesData) {
    if (scenesData[id].data.position === nextPos &&
        scenesData[id].data.direction === currentSceneObj.data.direction) {
      switchScene(id, currentView.parameters().yaw, currentView.parameters().pitch);
      return;
    }
  }
}

function executeMove(isUp) {
  var yaw = normalizeAngle(currentView.parameters().yaw);
  var isLookingFront = Math.abs(radToDeg(yaw)) <= 90;
  
  // ★特別ケース1（無効化）：左側コース最初のシーン → 右側コース移動は「扉クリック」でのみ
  
  // ★特別ケース2：左側コース → main に戻る
  if (currentSceneObj.data.direction === "left" && currentSceneObj.data.position === 1) {
    var shouldReturn = (isLookingFront && !isUp) || (!isLookingFront && isUp);
    if (shouldReturn) {
      // mainコースで、この左側シーンと対応する位置のシーンを探す
      var mainScene = window.APP_DATA.scenes.find(s => 
        s.direction === "main" && s.position === currentSceneObj.data.position
      );
      if (mainScene) {
        console.log('🚀 左側コース → main に戻る: ' + mainScene.id);
        switchScene(mainScene.id, yaw, currentView.parameters().pitch, currentView.parameters().fov);
        return;
      }
    }
  }
  
  // ★特別ケース4：ポータル専用シーン（脇道処理をスキップ）
  if (currentSceneObj.data.direction === "portal") {
    console.log('🎎 ポータル専用シーンです。脇道移動できません。');
    return;
  }
  
  // bb/cc での動作分岐（全シーン対応：bb01, bb02, bb03... / cc01, cc02, cc03...）
  if (isSideRoute(currentSceneObj.data.id)) {
    if (window.returnScene) {
      // 脇道経由：戻る条件をチェック
      var returnScene = window.returnScene;
      var shouldReturn = false;
      
      if (isSideRoute(currentSceneObj.data.id)) {
        shouldReturn = (isUp && !isLookingFront) || (!isUp && isLookingFront);
      }
      
      if (shouldReturn) {
        // bb/cc内に次のシーンがあるか確認
        var moveDelta = (isLookingFront ? 1 : -1) * (isUp ? 1 : -1);
        var moveNextPos = currentSceneObj.data.position + moveDelta;
        var nextSceneId = null;
        for (var tid in scenesData) {
          if (scenesData[tid].data.position === moveNextPos && scenesData[tid].data.direction === currentSceneObj.data.direction) {
            nextSceneId = tid;
            break;
          }
        }
        if (nextSceneId) {
          // 次のシーンがある → bb/cc内を移動（aaには戻らない）
          switchScene(nextSceneId, yaw, currentView.parameters().pitch, currentView.parameters().fov);
          return;
        }
        // 次のシーンがない → aaに戻る（cc/bbの現在yawから逆算）
        stopAutoMove();
        if (window.returnScene && window.departureYaw !== null) {
          var currentYaw = currentView.parameters().yaw;
          var entryInitYaw = window.entryInitialYaw || 0;
          var returnYaw;
          var storedOffset = window.entryYawOffset || 0;
          if (isLeftSide(currentSceneObj.data.id)) {
            returnYaw = normalizeAngle(currentYaw - entryInitYaw - degToRad(90) - storedOffset);
          } else if (isRightSide(currentSceneObj.data.id)) {
            returnYaw = normalizeAngle(currentYaw - entryInitYaw + degToRad(90) - storedOffset);
          } else {
            returnYaw = currentYaw;
          }
          var retPitch = window.departurePitch !== undefined ? window.departurePitch : currentView.parameters().pitch;
          switchScene(returnScene, returnYaw, retPitch, currentView.parameters().fov);
        } else {
          switchScene(returnScene, currentView.parameters().yaw, currentView.parameters().pitch, currentView.parameters().fov);
        }
        return;
      }
      // ★shouldReturn が false の場合は、以下のコース内移動を実行
    }
    
    // ★bb/cc コース内を前後移動
    console.log('📍 ' + currentSceneObj.data.id + ' コース内を移動');
    var delta = (isLookingFront ? 1 : -1) * (isUp ? 1 : -1);
    var nextPos = currentSceneObj.data.position + delta;
    for (var id in scenesData) {
      if (scenesData[id].data.position === nextPos && scenesData[id].data.direction === currentSceneObj.data.direction) {
        // 相対yaw引き継ぎ：現シーンの初期yawからのズレ分を次シーンの初期yawに加算
        var curInitYaw = currentSceneObj.data.initialViewParameters.yaw;
        var nxtInitYaw = scenesData[id].data.initialViewParameters.yaw;
        var relYaw = normalizeAngle(yaw - curInitYaw);
        var adjustedYaw = normalizeAngle(nxtInitYaw + relYaw);
        switchScene(id, adjustedYaw, currentView.parameters().pitch, currentView.parameters().fov);
        return;
      }
    }
    return;
  }

  // aa での通常の移動処理（黄色矢印）
  // ★2月版のロジック復元：direction を考慮、executeMoveByDelta使用
  var delta;
  if (currentSceneObj.data.direction === 'iki') {
    // 行きシーン：正面なら進む/下がる、後ろなら下がる/進む
    delta = isUp ? (isLookingFront ? 1 : -1) : (isLookingFront ? -1 : 1);
  } else {
    // 帰りシーン：正面なら下がる/進む、後ろなら進む/下がる
    delta = isUp ? (isLookingFront ? -1 : 1) : (isLookingFront ? 1 : -1);
  }
  if (flipDir) delta = -delta;
  executeMoveByDelta(delta);
}

// ★ 自動再生（ズームインのみ・黒画面なし）コースごと完全独立保存
var autoMoveInterval_ms=1875;
var breathMax=75,breathMin=75,breathFov=breathMax,autoFadePct=0.175;
var autoMoveTimer=null,autoMoveInterval=null,autoZoomInterval=null;
var autoMoveActive=false,autoStepping=false;

// 自動再生設定は作品を開き直しても勝手に戻らないよう、専用キーで固定保存する。
function _ck(){return 'marzipano_auto_settings_v3_';}
function _save(k,v){try{localStorage.setItem(_ck()+k,String(v));}catch(e){}}
function _load(k,def){try{var v=localStorage.getItem(_ck()+k);return v!==null?v:def;}catch(e){return def;}}

function applyAutoMoveSettings() {
  var s=Math.max(1,Math.min(9,parseInt(_load('speed','6'))));
  var z=Math.max(1,Math.min(9,parseInt(_load('zoom','2'))));
  var f=Math.max(1,Math.min(9,parseInt(_load('fade','8'))));
  document.getElementById('speedSlider').value=s;
  autoMoveInterval_ms=speedToMs(s);
  document.getElementById('speedVal').textContent=speedLabels[s]||s;
  document.getElementById('zoomSlider').value=z;
  breathMin=zoomToMin(z);
  document.getElementById('zoomVal').textContent=zoomLabels[z]||z;
  document.getElementById('fadeSlider').value=f;
  autoFadePct=fadeToPct(f);
  document.getElementById('fadeVal').textContent=fadeLabels[f]||f;
}

function startContinuousZoom(){
  if(autoZoomInterval){clearInterval(autoZoomInterval);autoZoomInterval=null;}
  breathFov=breathMax;
  if(currentView)currentView.setParameters({fov:degToRad(breathFov)});
  var stepMs=50,range=breathMax-breathMin;
  if(range<=0)return;
  var degsPerStep=range/(autoMoveInterval_ms/stepMs);
  autoZoomInterval=setInterval(function(){
    if(!autoMoveActive||!currentView){clearInterval(autoZoomInterval);autoZoomInterval=null;return;}
    breathFov-=degsPerStep;
    if(breathFov<breathMin-0.05)breathFov=breathMin-0.05;
    currentView.setParameters({fov:degToRad(breathFov)});
  },stepMs);
}
function stopAutoMove(){if(autoMoveTimer){clearTimeout(autoMoveTimer);autoMoveTimer=null;}
  if(autoMoveInterval){clearInterval(autoMoveInterval);autoMoveInterval=null;}
  if(autoZoomInterval){clearInterval(autoZoomInterval);autoZoomInterval=null;}
  autoMoveActive=false;autoStepping=false;
  breathFov=breathMax;
  if(currentView)currentView.setParameters({fov:degToRad(breathFov)});}
function autoStepOnce(isUp,startYaw){if(!autoMoveActive||autoStepping)return;
  if(Math.abs(radToDeg(normalizeAngle(currentView.parameters().yaw-startYaw)))>90){stopAutoMove();return;}
  autoStepping=true;if(autoZoomInterval){clearInterval(autoZoomInterval);autoZoomInterval=null;}
  var sceneBefore=currentSceneObj;executeMove(isUp);
  if(currentSceneObj===sceneBefore){stopAutoMove();return;}
  autoStepping=false;if(isUp)startContinuousZoom();}
function setupArrow(btnId,isUp){var btn=document.getElementById(btnId);
  function onPress(){if(autoMoveActive){stopAutoMove();return;}
    autoMoveTimer=setTimeout(function(){autoMoveTimer=null;autoMoveActive=true;
      var startYaw=currentView.parameters().yaw;if(isUp)startContinuousZoom();
      autoMoveInterval=setInterval(function(){autoStepOnce(isUp,startYaw);},autoMoveInterval_ms);},500);}
  function onRelease(){if(autoMoveTimer){clearTimeout(autoMoveTimer);autoMoveTimer=null;
    if(!autoMoveActive)executeMove(isUp);}}
  btn.addEventListener('mousedown',onPress);
  btn.addEventListener('touchstart',function(e){e.preventDefault();onPress();});
  btn.addEventListener('mouseup',onRelease);btn.addEventListener('touchend',onRelease);}

setupArrow('arrowUp', true);
setupArrow('arrowDown', false);

// ★シンプルな上下矢印処理（pitch保持）
function executeMoveSimple(isUp) {
  // ★2月版のロジック復元：direction を考慮
  if (!currentSceneObj) return;
  
  // ★ポータルシーン（dd001）では上下矢印を無効化
  if (currentSceneObj.data.id === '17-dd001') return;
  if (currentSceneObj.data.direction === 'portal') return;
  
  var yaw = normalizeAngle(currentView.parameters().yaw);
  var isLookingFront = Math.abs(radToDeg(yaw)) <= 90;
  
  var delta;
  if (currentSceneObj.data.direction === 'iki') {
    delta = isUp ? (isLookingFront ? 1 : -1) : (isLookingFront ? -1 : 1);
  } else {
    delta = isUp ? (isLookingFront ? -1 : 1) : (isLookingFront ? 1 : -1);
  }
  
  executeMoveByDelta(delta);
}

// クリック時は直接executeMoveSimplifを呼び出す
// ★上下矢印は setupArrow で処理（click イベントハンドラーは削除）

// 左右矢印と緑矢印のみ click イベント
document.getElementById('arrowLeft').addEventListener('click', function() {
  if (autoMoveActive) { stopAutoMove(); return; }
  executeSideMove('left');
});
document.getElementById('arrowRight').addEventListener('click', function() {
  if (autoMoveActive) { stopAutoMove(); return; }
  executeSideMove('right');
});
document.getElementById('arrowUpGreen').addEventListener('click', function() {
  if (!currentSceneObj || !window.greenArrowConfig || window.greenArrowConfig.arrows.length === 0) return;
  
  var yawDeg = radToDeg(normalizeAngle(currentView.parameters().yaw));
  
  // すべての脇道をチェック
  for (var i = 0; i < window.greenArrowConfig.arrows.length; i++) {
    var arrow = window.greenArrowConfig.arrows[i];
    // シーンID一致 & 角度範囲内か確認
    if (currentSceneObj.data.id === arrow.sceneId) {
      // startAngle <= endAngle か startAngle > endAngle かで判定方式を切り替え
      var isInRange = false;
      if (arrow.startAngle <= arrow.endAngle) {
        isInRange = yawDeg >= arrow.startAngle && yawDeg <= arrow.endAngle;
      } else {
        isInRange = yawDeg >= arrow.endAngle && yawDeg <= arrow.startAngle;
      }
      
      if (isInRange) {
        var targetObj = scenesData[arrow.targetSceneId];
        if (!targetObj) return;
        var targetInitialYaw = targetObj.data.initialViewParameters.yaw;
        var departureYaw = currentView.parameters().yaw;
        var fromSceneId = currentSceneObj.data.id;
        var returningToMain = isSideRoute(fromSceneId) && !isSideRoute(arrow.targetSceneId);

        var newYaw = computeGreenArrowTargetYaw(arrow, departureYaw, targetInitialYaw, fromSceneId);
        var yawOff = arrow.yawOffset ? degToRad(parseFloat(arrow.yawOffset)) : 0;
        var pitchOff = arrow.pitchOffset ? degToRad(parseFloat(arrow.pitchOffset)) : 0;

        console.log('🟢 GREEN ARROW: ' + fromSceneId + ' → ' + arrow.targetSceneId +
          ' newYaw: ' + radToDeg(newYaw).toFixed(2) + '°' +
          (arrow.yawOffset != null ? ' (yawOffset=' + arrow.yawOffset + '°)' : ''));

        if (returningToMain) {
          window.returnScene = null;
          window.departureYaw = null;
          window.departurePitch = null;
          window.entryInitialYaw = null;
          window.entryYawOffset = 0;
        } else {
          window.returnScene = fromSceneId;
          window.departureYaw = departureYaw;
          window.departurePitch = currentView.parameters().pitch;
          window.targetSceneId = arrow.targetSceneId;
          window.entryInitialYaw = targetInitialYaw;
          window.entryYawOffset = yawOff;
        }

        switchScene(arrow.targetSceneId, newYaw, currentView.parameters().pitch + pitchOff, currentView.parameters().fov);
        return;
      }
    }
  }
});

function executeSideMove(dir) {
  // ★ポータルシーン（dd001）では左右矢印を無効化
  if (!currentSceneObj) return;
  if (currentSceneObj.data.id === '17-dd001') return;
  if (currentSceneObj.data.direction === 'portal') return;
  
  // ★2月版のロジック復元：executeMoveByDelta使用
  var yaw = normalizeAngle(currentView.parameters().yaw);
  var delta;
  if (yaw < 0) {
    delta = (dir === 'left' ? -1 : 1);
  } else {
    delta = (dir === 'left' ? 1 : -1);
  }
  if (flipDir) delta = -delta;
  executeMoveByDelta(delta);
}

function normalizeAngle(a) { while (a > Math.PI) a -= 2*Math.PI; while (a < -Math.PI) a += 2*Math.PI; return a; }

// ★ directionベースの判定（汎用化）
function isLeftSide(id) {
  var scene = window.APP_DATA.scenes.find(s => s.id === id);
  return scene && scene.direction === "left";
}
function isRightSide(id) {
  var scene = window.APP_DATA.scenes.find(s => s.id === id);
  return scene && scene.direction === "right";
}

// ★ ポータルシーン一覧を動的に構築
var PORTAL_SCENES = [];
if (window.APP_DATA && window.APP_DATA.scenes) {
  window.APP_DATA.scenes.forEach(function(scene) {
    if (scene.direction === "portal") {
      PORTAL_SCENES.push(scene.id);
    }
  });
}
console.log('🔹 PORTAL_SCENES (動的構築):', PORTAL_SCENES);

function isSideRoute(id) { 
  // ★ポータル専用シーンは脇道から除外
  var scene = window.APP_DATA.scenes.find(s => s.id === id);
  if (scene && scene.direction === "portal") return false;
  return isLeftSide(id) || isRightSide(id); 
}

// 緑矢印クリック時の到着yawを計算
// yawOffset は「移動先シーンの初期yawからの角度（度）」として扱う（例: -90 → 正面が-90°）
function computeGreenArrowTargetYaw(arrow, departureYaw, targetInitialYaw, fromSceneId) {
  var hasYawOffset = arrow.yawOffset !== undefined && arrow.yawOffset !== null && arrow.yawOffset !== '';
  var yawOffRad = hasYawOffset ? degToRad(parseFloat(arrow.yawOffset)) : 0;

  // 脇道（bb/cc）→ 本線（aa）へ戻る
  if (isSideRoute(fromSceneId) && !isSideRoute(arrow.targetSceneId)) {
    if (hasYawOffset) {
      return normalizeAngle(targetInitialYaw + yawOffRad);
    }
    if (window.departureYaw !== null) {
      return window.departureYaw;
    }
    if (isLeftSide(fromSceneId)) {
      return normalizeAngle(departureYaw + targetInitialYaw + degToRad(90));
    }
    if (isRightSide(fromSceneId)) {
      return normalizeAngle(departureYaw + targetInitialYaw - degToRad(90));
    }
    return departureYaw;
  }

  // 本線 → 脇道（bb/cc）へ入る
  if (isLeftSide(arrow.targetSceneId)) {
    return normalizeAngle(departureYaw + targetInitialYaw + degToRad(90) + yawOffRad);
  }
  if (isRightSide(arrow.targetSceneId)) {
    return normalizeAngle(departureYaw + targetInitialYaw - degToRad(90) + yawOffRad);
  }
  if (hasYawOffset) {
    return normalizeAngle(targetInitialYaw + yawOffRad);
  }
  return normalizeAngle(departureYaw + yawOffRad);
}

function degToRad(d) { return d * Math.PI / 180; }
function radToDeg(r) { return r * 180 / Math.PI; }
window.goToMap = function() { location.href = urlParams.get('back') || 'map.html'; };

// ========================================
// ★ BGM再生管理
// ========================================
function shouldPlayBGM() {
  return audioEnabled && bgmPlaying && (bgmEnabled || bgmForce);
}

function playSceneBGM(sceneId, opts) {
  var force = !!(opts && opts.force);
  if (!audioEnabled) return;
  if (!force && !shouldPlayBGM()) {
    // 地図OFFで強制再生もしていない → 全停止
    stopAllBGM();
    return;
  }
  
  var sceneObj = scenesData[sceneId];
  if (!sceneObj || !sceneObj.data.bgm) {
    // BGM指定なし：全BGMをフェードアウト
    stopAllBGM();
    return;
  }
  
  // data.js: bgm は [{file, loop}] の配列（作品によって string/array 混在もあるため吸収）
  var bgmItems = [];
  if (Array.isArray(sceneObj.data.bgm)) {
    bgmItems = sceneObj.data.bgm.map(function(item) {
      if (typeof item === 'string') return { file: item };
      return item || {};
    });
  } else if (typeof sceneObj.data.bgm === 'string') {
    bgmItems = sceneObj.data.bgm.split(' ').map(function(s) { return s.trim(); }).filter(Boolean).map(function(f) { return { file: f }; });
  }

  var bgmFiles = bgmItems.map(function(item) { return item.file; }).filter(Boolean);
  
  if (bgmFiles.length === 0) {
    stopAllBGM();
    return;
  }
  
  // 新しいBGMファイル一覧を作成
  var newBGMSet = {};
  bgmFiles.forEach(function(file) {
    newBGMSet[file] = true;
  });
  
  // 古いBGMをフェードアウト（新しいリストにないもの）
  Object.keys(bgmAudios).forEach(function(key) {
    if (!newBGMSet[key]) {
      fadeOutAudio(bgmAudios[key], function() {
        bgmAudios[key].pause();
        delete bgmAudios[key];
      });
    }
  });
  
  // 新しいBGMを再生（既に再生中でなければ）
  bgmItems.forEach(function(item) {
    var file = item.file;
    if (!file) return;
    if (!bgmAudios[file] || (bgmAudios[file].paused && !bgmAudios[file].ended)) {
      playAudio('sounds/' + file, {
        loop: resolveLoopFlag(file, item)
      });
    } else {
      // すでに鳴っている場合も loop 状態は合わせる
      bgmAudios[file].loop = resolveLoopFlag(file, item);
      bgmAudios[file].volume = bgmVolume;
    }
  });
}

function resolveLoopFlag(fileName, item) {
  // data.js の loop 指定だけを採用（ファイル名からの推測はしない）
  if (item && typeof item.loop === 'boolean') return item.loop;
  return false;
}

function playAudio(filePath, opts) {
  var audio = new Audio(filePath);
  audio.loop = !!(opts && opts.loop);
  audio.volume = 0; // fade in
  
  audio.addEventListener('canplay', function() {
    fadeInAudio(audio, bgmVolume, 500);
  });
  
  audio.addEventListener('error', function() {
    console.error('❌ BGM読込エラー:', filePath);
  });
  
  audio.play().catch(function(err) {
    console.error('❌ BGM再生エラー:', err);
  });
  
  bgmAudios[filePath.replace('sounds/', '')] = audio;
}

function fadeOutAudio(audio, callback) {
  if (!audio || audio.volume === 0) {
    if (callback) callback();
    return;
  }
  
  var startVol = audio.volume;
  var stepCount = bgmFadeOutDuration / 50;  // 50ms間隔
  var stepVol = startVol / stepCount;
  var timer = setInterval(function() {
    audio.volume = Math.max(0, audio.volume - stepVol);
    if (audio.volume <= 0) {
      clearInterval(timer);
      audio.volume = 0;
      if (callback) callback();
    }
  }, 50);
}

function fadeInAudio(audio, targetVol, duration) {
  audio.volume = 0;
  var stepCount = duration / 50;
  var stepVol = targetVol / stepCount;
  var timer = setInterval(function() {
    if (audio.volume < targetVol) {
      audio.volume = Math.min(targetVol, audio.volume + stepVol);
    } else {
      clearInterval(timer);
      audio.volume = targetVol;
    }
  }, 50);
}

function stopAllBGM() {
  Object.keys(bgmAudios).forEach(function(key) {
    fadeOutAudio(bgmAudios[key], function() {
      bgmAudios[key].pause();
      delete bgmAudios[key];
    });
  });
}

function enableBGM() {
  bgmEnabled = true;
  localStorage.setItem('bgmEnabled', 'true');
  console.log('🎵 BGM有効化');
  if (currentSceneObj) playSceneBGM(currentSceneObj.data.id);
}

function disableBGM() {
  bgmEnabled = false;
  localStorage.setItem('bgmEnabled', 'false');
  // 強制再生中でなければ停止
  if (!bgmForce) stopAllBGM();
  console.log('🔇 BGM無効化');
}

// デバッグ：初期シーンIDを確認
console.log('🔵 IIFE外 urlParams:', urlParams.toString());
console.log('🔵 IIFE外 urlParams.get("id"):', urlParams.get('id'));
console.log('🔵 About to call switchScene with id:', urlParams.get('id') || '0-aa001');

switchScene(urlParams.get('id') || '0-aa001');

}
